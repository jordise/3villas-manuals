*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
const CONFIG_KEY = '3villas_caspio_config';
const PROXY_URL = 'https://caspio-proxy.jordi-89b.workers.dev';
const DEFAULT_CLIENT_ID = '7940b2a813ac4f75778f76cb56311e877e3084dd8bf2b057dd';
const DEFAULT_CLIENT_SECRET = 'd0ea1b6508f5499486af4559e389e1a5e9d0e4df8b991cc1b8';
const DEFAULT_TABLE = 'TaVillas';

function saveConfig() {
  const cfg = {
    clientId: document.getElementById('caspio-client-id').value,
    clientSecret: document.getElementById('caspio-client-secret').value,
    table: document.getElementById('caspio-table').value
  };
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); } catch(e) {}
  showStatus('success', 'Configuración guardada');
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (!raw) return;
    const cfg = JSON.parse(raw);
    if (cfg.clientId) document.getElementById('caspio-client-id').value = cfg.clientId;
    if (cfg.clientSecret) document.getElementById('caspio-client-secret').value = cfg.clientSecret;
    if (cfg.table) document.getElementById('caspio-table').value = cfg.table;
  } catch(e) {}
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status-bar show ' + type;
  const icon = type === 'loading' ? '<div class="spinner"></div>' : type === 'success' ? '✓' : '✗';
  el.innerHTML = icon + ' ' + msg;
  if (type !== 'loading') setTimeout(() => el.classList.remove('show'), 4000);
}

function getCredentials() {
  try {
    const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    return {
      clientId: (cfg.clientId && cfg.clientId.length > 10) ? cfg.clientId : DEFAULT_CLIENT_ID,
      clientSecret: (cfg.clientSecret && cfg.clientSecret.length > 10) ? cfg.clientSecret : DEFAULT_CLIENT_SECRET,
      table: cfg.table || DEFAULT_TABLE
    };
  } catch(e) {
    return { clientId: DEFAULT_CLIENT_ID, clientSecret: DEFAULT_CLIENT_SECRET, table: DEFAULT_TABLE };
  }
}

function mapRecord(raw) {
  return {
    property_id:              raw['Hostawayid'] || '',
    nombre:                   raw['Name_villa_para_inquilinos'] || raw['Name'] || '',
    address:                  raw['Address'] || '',
    license:                  raw['License'] || '',
    zona:                     raw['Zone'] || '',
    wifi_nombre:              raw['Wifi_user'] || '',
    wifi_password:            raw['Wifi_password'] || '',
    playa_distancia:          raw['Beach_distance'] || '',
    restaurante:              raw['Restaurant_distance'] || '',
    supermercado:             raw['Supermarket_distance'] || '',
    farmacia:                 raw['Pharmacy_distance'] || '',
    aeropuerto:               raw['Airport_distance'] || '',
    transporte:               raw['Public_transpost'] || '',
    taxi:                     raw['Taxi_and_Transfers'] || '',
    cuadro_electrico:         raw['where_is_mainpower'] || '',
    llave_paso:               raw['wher_is_water_stopcock'] || '',
    manager:                  raw['KeyHolder_person'] || '',
    bbq:                      raw['BBQ'] || '',
    piscina:                  raw['size_of_swimingpool'] || '',
    pax:                      raw['Pax_legal'] || '',
    keybox:                   raw['Keybox_code'] || '',
    listing:                  raw['linkweb'] || '',
    drive:                    raw['Drive'] || '',
    googlemaps:               raw['Googlemaps_link'] || '',
    aircon_info:              raw['Explanation_aircon'] || '',
    parking:                  raw['Parking_aditionalinfo'] || '',
    views:                    raw['Views'] || '',
    comentarios:              raw['Comercial_info'] || '',
    nombre_corto:             raw['Name'] || raw['Name_villa_para_inquilinos'] || '',
    first_aid:                raw['where_is_first_aid'] || '',
    keybox2:                  raw['Keybox_code2'] || '',
  };
}

async function fetchPropertyFromCaspio(propertyId) {
  const creds = getCredentials();
  // Fresh token
  const tokenResp = await fetch(
    PROXY_URL + '?path=/oauth/token&client_id=' + creds.clientId + '&client_secret=' + creds.clientSecret
  );
  if (!tokenResp.ok) throw new Error('Error obteniendo token (' + tokenResp.status + ')');
  const tokenData = await tokenResp.json();
  const token = tokenData.access_token;
  if (!token) throw new Error('Token inválido');

  // Query
  const caspioPart = encodeURIComponent('/rest/v2/tables/' + creds.table + '/records?q.where=Hostawayid=' + propertyId + '&q.limit=1');
  const res = await fetch(PROXY_URL + '?path=' + caspioPart, {
    headers: { Authorization: 'Bearer ' + token, Accept: 'application/json' }
  });
  if (!res.ok) throw new Error('Error consultando datos (' + res.status + ')');
  const data = await res.json();
  if (!data.Result || data.Result.length === 0) throw new Error('Propiedad ' + propertyId + ' no encontrada en ' + creds.table);
  return mapRecord(data.Result[0]);
}

async function fetchDrivePhoto(driveUrl) {
  if (!driveUrl) return null;
  // Extract folder ID from Drive URL and get first image
  const match = driveUrl.match(/folders\/([a-zA-Z0-9_-]+)/);
  if (!match) return null;
  const folderId = match[1];
  // Return a direct Google Drive thumbnail URL
  return 'https://drive.google.com/thumbnail?id=' + folderId + '&sz=w800';
}

let currentData = null;

async function generateManual() {
  const propertyId = document.getElementById('property-id').value.trim();
  if (!propertyId) { showStatus('error', 'Introduce un Hostawayid'); return; }

  const btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generando...';
  showStatus('loading', 'Conectando con Caspio...');

  try {
    showStatus('loading', 'Obteniendo datos de TaVillas...');
    const propData = await fetchPropertyFromCaspio(propertyId);

    showStatus('loading', 'Cargando foto de la propiedad...');
    let photoUrl = null;
    if (propData.drive) {
      photoUrl = await fetchDrivePhoto(propData.drive);
    }

    currentData = { ...propData, photoUrl, propertyId };
    renderManual(currentData);

    document.getElementById('prop-badge').textContent = propData.nombre + ' · ID ' + propertyId;
    document.getElementById('btn-html').disabled = false;
    document.getElementById('btn-pdf').disabled = false;
    showStatus('success', '¡Manual generado correctamente!');
  } catch(err) {
    showStatus('error', err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Generar Manual';
  }
}

function getLangs() {
  const l = [];
  if (document.getElementById('l-ca').checked) l.push('CATALÁ');
  if (document.getElementById('l-es').checked) l.push('CASTELLANO');
  if (document.getElementById('l-en').checked) l.push('ENGLISH');
  if (document.getElementById('l-fr').checked) l.push('FRANÇAIS');
  if (document.getElementById('l-de').checked) l.push('DEUTSCH');
  return l;
}

function langBar(activeIdx) {
  const langs = getLangs();
  return '<div class="lang-bar">' +
    langs.map((l, i) => '<div class="lang-item' + (i === activeIdx ? ' active' : '') + '">' + l + '</div>').join('') +
    '</div>';
}

function downloadHTML() {
  if (!currentData) return;
  const out = document.getElementById('manual-output');
  if (!out) return;
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>body{margin:20px;background:#888;font-family:'DM Sans',sans-serif}</style>
  <style>${document.querySelector('style').textContent}</style>
  <title>Manual ${currentData.nombre}</title></head><body>${out.outerHTML}</body></html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  a.download = 'manual_' + (currentData.nombre || currentData.propertyId).replace(/\s/g,'_') + '.html';
  a.click();
}
