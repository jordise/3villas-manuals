<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3villas · Generador de Manuales</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D32E2E;--dark:#1A1A1A;--white:#FFFFFF;--light:#F5F5F5;--border:#DEDEDE}
body{font-family:'Open Sans',sans-serif;background:#EFEFEF;color:var(--dark);min-height:100vh}

/* APP HEADER */
header{background:var(--dark);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
header img.hlogo{height:28px}
header nav{font-size:11px;color:#888;letter-spacing:.1em;text-transform:uppercase}

/* APP LAYOUT */
.app{max-width:1340px;margin:0 auto;padding:20px;display:grid;grid-template-columns:290px 1fr;gap:20px;align-items:start}

/* SIDEBAR */
.sidebar{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;position:sticky;top:72px}
.sidebar-head{background:var(--dark);padding:18px 20px;color:#fff}
.sidebar-head h2{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.sidebar-head p{font-size:11px;color:#999}
.sidebar-body{padding:18px}
.flabel{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:5px;display:block}
input[type=text],input[type=password]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--dark);background:var(--light);outline:none;margin-bottom:12px;font-family:inherit}
input:focus{border-color:var(--red);background:#fff}
.btn{width:100%;padding:10px;border-radius:7px;border:none;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;transition:all .15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b82626}.btn-red:disabled{background:#ccc;cursor:not-allowed}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:#333}
.btn-outline{background:transparent;color:var(--dark);border:1px solid var(--border)}.btn-outline:hover{background:var(--light)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.status{padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none;align-items:center;gap:8px}
.status.show{display:flex}
.status.loading{background:#FEF9EC;color:#92400E;border:1px solid #FCD34D}
.status.success{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.status.error{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5}
.spinner{width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.cfg-toggle{font-size:11px;color:var(--red);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;margin-bottom:12px;display:block;font-family:inherit}
.cfg-box{display:none;background:var(--light);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:12px}
.cfg-box.open{display:block}
.proxy-ok{background:#ECFDF5;border:1px solid #6EE7B7;border-radius:6px;padding:7px 10px;margin-bottom:12px;font-size:11px;color:#065F46;font-weight:600}
.info-badge{background:#EEF4FF;color:#2563EB;font-size:11px;padding:7px 10px;border-radius:6px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.lang-grid label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;font-weight:400}

/* PREVIEW AREA */
.preview{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;min-height:700px}
.preview-bar{background:#EBEBEB;border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.preview-bar span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#777}
.preview-body{background:#888;padding:16px;overflow:auto;max-height:87vh}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;background:#fff;color:#bbb;text-align:center;padding:30px}
.preview-empty div{font-size:40px;opacity:.25;margin-bottom:12px}
.preview-empty h3{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#ccc;margin-bottom:8px}
.preview-empty p{font-size:12px}

/* ══════════════════════════════════════════
   MANUAL STYLES — RÉPLICA EXACTA DEL PDF
══════════════════════════════════════════ */
#manual{font-family:'Montserrat',sans-serif;font-size:10pt;color:#1A1A1A}

/* Página base */
.pg{width:794px;min-height:1123px;background:#fff;margin:0 auto 6px;display:flex;position:relative}

/* Sidebar idiomas */
.lbar{width:20px;background:#1A1A1A;flex-shrink:0;display:flex;flex-direction:column}
.li{flex:1;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;transform:rotate(180deg);font-size:6.5pt;letter-spacing:.12em;text-transform:uppercase;color:#555;font-weight:600}
.li.act{background:#D32E2E;color:#fff}

/* Contenido interno */
.pc{flex:1;padding:38px 46px;position:relative}
.pn{position:absolute;bottom:16px;right:28px;font-size:8pt;color:#bbb}

/* ── PORTADA ── */
.pg-cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 55px;min-height:1123px}
.cover-h{font-size:52pt;font-weight:900;line-height:1.05;margin-bottom:36px;color:#1A1A1A}
.cover-h .dot{color:#D32E2E}
.cover-img{width:100%;height:320px;object-fit:cover;border-radius:14px;margin-bottom:48px}
.cover-img-ph{width:100%;height:320px;background:#EDEBE7;border-radius:14px;margin-bottom:48px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13pt;font-weight:600}
.cover-bot{width:100%;display:flex;align-items:flex-end;justify-content:space-between}
.cover-bot img{height:44px}
.qr-ph{width:70px;height:70px;background:#E8E8E8;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8pt;color:#aaa;text-align:center;line-height:1.3}
.cover-brand{text-align:left}

/* ── TIPOGRAFÍA INTERNA ── */
.pc h1{font-size:22pt;font-weight:900;line-height:1.1;margin-bottom:14px}
.pc h2{font-size:10pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.pc p{font-size:9pt;font-weight:400;margin-bottom:7px;line-height:1.55;font-family:'Open Sans',sans-serif}
.two{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:18px}
.sep{border:none;border-top:1px solid #E5E2DC;margin:11px 0}

/* ── RECUADROS EXACTOS DEL PDF ── */
/* WiFi */
.wifi-wrap{text-align:center;margin:18px 0}
.wifi-title{font-size:28pt;font-weight:900;margin-bottom:12px;letter-spacing:-.01em}
.wifi-inner{background:#F7F5F2;border:1px solid #DEDBD6;border-radius:10px;padding:14px 20px;display:inline-block;min-width:280px}
.wifi-row{font-size:9pt;font-family:'Open Sans',sans-serif;margin-bottom:5px}
.wifi-val{font-weight:700;font-size:10pt}

/* Manager card */
.mgr-wrap{background:#F7F5F2;border-radius:10px;padding:16px;text-align:center;margin-top:14px}
.mgr-title{font-size:26pt;font-weight:900;margin-bottom:14px;letter-spacing:-.01em}
.mgr-av{width:56px;height:56px;border-radius:50%;background:#D8D6D2;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22pt;font-weight:900;color:#aaa;overflow:hidden}
.mgr-av img{width:100%;height:100%;object-fit:cover}
.mgr-name{font-size:20pt;font-weight:900;margin-bottom:2px}
.mgr-role{font-size:8pt;color:#D32E2E;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.mgr-hrs{font-size:8pt;color:#666;margin-bottom:10px;line-height:1.6;font-family:'Open Sans',sans-serif}
.mgr-phone{font-size:28pt;font-weight:900}

/* Info blocks 2x2 */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.ib h2{font-size:10pt;margin-bottom:4px}
.ib p{font-size:8.5pt;color:#444;font-family:'Open Sans',sans-serif;line-height:1.5}

/* Highlight box (emergencias) */
.hbox{background:#FBE9E9;border-left:4px solid #D32E2E;padding:9px 14px;border-radius:0 7px 7px 0;margin-bottom:10px}
.hbox .hl{font-size:7.5pt;color:#999;margin-bottom:3px;font-family:'Open Sans',sans-serif}
.hbox .hv{font-size:20pt;font-weight:900;line-height:1.1}

/* Emergency box */
.ebox{background:#FEF9EC;border:2px solid #F59E0B;border-radius:8px;padding:11px 14px;text-align:center;margin-bottom:10px}
.ebox .el{font-size:7.5pt;font-weight:700;color:#B45309;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.ebox .en{font-size:34pt;font-weight:900;color:#D32E2E;line-height:1}

/* Bullet rows */
.bl{display:flex;gap:6px;margin-bottom:4px;font-size:9pt;font-family:'Open Sans',sans-serif;align-items:flex-start}
.bl .ar{color:#D32E2E;font-weight:700;flex-shrink:0;margin-top:1px}

/* Rule items */
.rl{display:flex;gap:8px;margin-bottom:5px;font-size:8.5pt;font-family:'Open Sans',sans-serif;align-items:flex-start}
.rn{flex-shrink:0;width:16px;height:16px;background:#D32E2E;color:#fff;border-radius:50%;font-size:8pt;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}

/* Map placeholder */
.mbox{background:#E8EFF6;border-radius:8px;height:160px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:9pt;text-align:center;margin-top:16px;font-family:'Open Sans',sans-serif}

@media print{
  header,.sidebar,.preview-bar{display:none!important}
  .app{display:block;padding:0}
  .preview,.preview-body{border:none;border-radius:0;background:white;padding:0;max-height:none;overflow:visible}
  .pg{margin:0;page-break-after:always}
}
</style>
</head>

function saveConfig(){
  try{localStorage.setItem(CFGK,JSON.stringify({clientId:document.getElementById('cid').value,clientSecret:document.getElementById('csec').value,table:document.getElementById('ctbl').value}));}catch(e){}
  st('success','Configuración guardada');
}
function loadConfig(){
  try{const c=JSON.parse(localStorage.getItem(CFGK)||'{}');if(c.clientId)document.getElementById('cid').value=c.clientId;if(c.clientSecret)document.getElementById('csec').value=c.clientSecret;if(c.table)document.getElementById('ctbl').value=c.table;}catch(e){}
}
function getCreds(){
  try{const c=JSON.parse(localStorage.getItem(CFGK)||'{}');return{id:c.clientId&&c.clientId.length>10?c.clientId:DID,sc:c.clientSecret&&c.clientSecret.length>10?c.clientSecret:DSC,tbl:c.table||DTBL};}
  catch(e){return{id:DID,sc:DSC,tbl:DTBL};}
}
function st(type,msg){
  const el=document.getElementById('st');
  el.className='status show '+type;
  el.innerHTML=(type==='loading'?'<div class="spinner"></div>':type==='success'?'✓':'✗')+' '+msg;
  if(type!=='loading')setTimeout(()=>el.classList.remove('show'),4000);
}

async function fetchProp(pid){
  const c=getCreds();
  const tr=await fetch(PROXY+'?path=/oauth/token&client_id='+c.id+'&client_secret='+c.sc);
  if(!tr.ok)throw new Error('Error token ('+tr.status+')');
  const td=await tr.json();
  if(!td.access_token)throw new Error('Token inválido');
  const path=encodeURIComponent('/rest/v2/tables/'+c.tbl+'/records?q.where=Hostawayid='+pid+'&q.limit=1');
  const dr=await fetch(PROXY+'?path='+path,{headers:{Authorization:'Bearer '+td.access_token,Accept:'application/json'}});
  if(!dr.ok)throw new Error('Error datos ('+dr.status+')');
  const dd=await dr.json();
  if(!dd.Result||!dd.Result.length)throw new Error('Propiedad '+pid+' no encontrada en '+c.tbl);
  return mapRecord(dd.Result[0]);
}

function drivePhoto(url){
  if(!url)return null;
  const m=url.match(/folders\/([a-zA-Z0-9_-]+)/);
  if(!m)return null;
  return'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w900';
}

let CD=null;
async function gen(){
  const pid=document.getElementById('pid').value.trim();
  if(!pid){st('error','Introduce un Hostawayid');return;}
  const btn=document.getElementById('btngen');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Generando...';
  st('loading','Conectando con Caspio...');
  try{
    st('loading','Obteniendo datos de TaVillas...');
    const d=await fetchProp(pid);
    const photo=drivePhoto(d.drive);
    CD={...d,photo,pid};
    render(CD);
    document.getElementById('pbadge').textContent=d.nombre+' · ID '+pid;
    document.getElementById('bdl').disabled=false;
    document.getElementById('bpdf').disabled=false;
    st('success','¡Manual generado!');
  }catch(e){st('error',e.message);}
  finally{btn.disabled=false;btn.innerHTML='Generar Manual';}
}
